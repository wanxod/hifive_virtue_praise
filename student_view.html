<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>나의 가치 보석 칭찬 통장</title>
    <style>
        /* 구글 CDN 이서윤체 실시간 웹 로드 (모바일 100% 호환) */
        @font-face {
            font-family: 'HKLeeseoyun_Cloud';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_twelve@1.1/HKLeeseoyun.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }

        * {
            font-family: 'HKLeeseoyun_Cloud', '맑은 고딕', sans-serif !important;
            box-sizing: border-box;
        }

        body {
            font-size: 24px;
            background-color: #fcf9f2;
            color: #333;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
            margin-bottom: 5px;
            font-size: 38px;
        }
        .name-purple { color: #9b59b6; }    
        .value-default { color: #ff6b76; }  
        .bank-blue { color: #3498db; }      

        .summary-box {
            font-size: 26px;
            color: #000000; 
            font-weight: bold;
            margin-bottom: 35px;
        }

        .student-main-layout {
            display: flex;
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto;
            text-align: left;
        }

        .left-jewel-board {
            flex: 0 0 68%;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            border: 3px dashed #ff8b94; 
        }

        .bank-grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr); 
            gap: 10px; 
            justify-items: center;
            justify-content: center;
            width: 100%;
        }

        .bank-slot {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            cursor: pointer;
            width: 100%;
        }
        
        .bank-circle {
            width: 52px;
            height: 52px;
            border-radius: 50% !important; 
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .bank-label { font-size: 15px; margin-top: 6px; font-weight: bold; color: #444; text-align: center; }
        .bank-date { font-size: 12px; color: #888; margin-top: 2px; }

        .right-badge-board {
            flex: 0 0 32%;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            border: 3px dashed #117a65;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .badge-title-header {
            margin: 0 0 15px 0; 
            color:#117a65; 
            font-size:25px;
            border-bottom: 2px solid #a3e4d7;
            padding-bottom: 8px;
            width: 100%;
        }

        .badge-item {
            background-color: #e8f8f5;
            border: 2px solid #a3e4d7;
            color: #117a65;
            padding: 10px 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 20px;
            margin-bottom: 10px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 모바일 세로 화면 대응 자동 정렬 센서 */
        @media (max-width: 768px) {
            body { padding: 10px; }
            h1 { font-size: 28px; }
            .summary-box { font-size: 20px; margin-bottom: 15px; }
            .student-main-layout { flex-direction: column; gap: 15px; }
            .left-jewel-board, .right-badge-board { flex: 0 0 100%; width: 100%; padding: 15px; }
            
            .bank-grid { gap: 6px; }
            .bank-circle { width: 34px; height: 32px; font-size: 18px; }
            .bank-label { font-size: 11px; margin-top: 4px; }
            .bank-date { display: none; }
            .badge-title-header { font-size: 20px; }
            .badge-item { font-size: 17px; padding: 8px 12px; }
        }

        /* 팝업 모달 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 390px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }
        .modal-circle {
            width: 75px; height: 75px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 38px; margin: 0 auto 15px auto; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .modal-info-card {
            font-size: 21px; margin: 15px 0; color: #444; text-align: left; background: #fdfbfc; padding: 15px; border: 1px solid #eee; border-radius: 10px; line-height: 1.6;
        }
        .close-btn {
            background-color: #ff8b94; color: white; border: none; padding: 12px 30px; font-size: 23px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%;
        }
    </style>
</head>
<body>

    <h1>
        ✨ <span id="studentName" class="name-purple">나</span>의 
        <span class="value-default">가치 보석💎</span> 
        <span class="bank-blue">칭찬 통장</span> ✨
    </h1>
    <div class="summary-box" id="summaryCounter">가치 보석함을 실시간 연동 중입니다...</div>

    <div class="student-main-layout">
        <div class="left-jewel-board">
            <div class="bank-grid" id="studentBankGrid"></div>
        </div>

        <div class="right-badge-board">
            <h3 class="badge-title-header">🏅 나의 가치 배지함</h3>
            <div id="badgeGridZone" style="width:100%;"></div>
        </div>
    </div>

    <div class="modal-overlay" id="studentDetailModal">
        <div class="modal-content">
            <div class="modal-circle" id="mCircle"></div>
            <h2 style="margin: 0 0 10px 0;">보석 상세 내역</h2>
            <div class="modal-info-card">
                <strong>📅 받은 날짜:</strong> <span id="mDate"></span><br>
                <strong style="display:inline-block; margin-top:8px;">📝 선생님의 칭찬 말씀:</strong><br>
                <span id="mReason" style="color: #ff6b76; font-weight: bold;"></span>
            </div>
            <button class="close-btn" onclick="closeStudentModal()">닫기</button>
        </div>
    </div>

    <script>
        // ★여기에 1단계에서 복사해둔 구글 스프레드시트 [웹에 게시] .csv 주소를 넣어주세요!
        const googleSheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRzKBqNSj9WvbbVfW9FngjjuiLBOkgniw7nkAP0ZUoSptVbAiNoR4zc22opiL19SuH5yn9YEn_aHxPt/pub?gid=0&single=true&output=csv";

        const studentNamesList = [
            "강채원", "구강민", "권지윤", "김규민", "김단우", "김시율", "김은호", "노규비", 
            "문채민", "박서우", "박세담", "백주은", "손현우", "신채현", "심하준", "윤강현", 
            "이루나", "이루아", "전은지", "정유나", "정재이", "정하늘", "조우성", "진주완", 
            "최혜린", "하재율", "하태준", "황정원"
        ];

        let currentStudent = { id: 1, name: "강채원", inventory: [], badges: [] };

        // 구글 시트에서 실시간 데이터를 받아와 파싱하는 엔진
        async function fetchLiveSheetData() {
            const urlParams = new URLSearchParams(window.location.search);
            const studentId = parseInt(urlParams.get('id')) || 1;
            currentStudent.id = studentId;
            currentStudent.name = studentNamesList[studentId - 1] || "기쁨이";

            try {
                const response = await fetch(googleSheetCsvUrl);
                const dataText = await response.text();
                
                // CSV 행 데이터 분해 규칙
                const rows = dataText.split("\n").map(row => row.split(","));
                
                // 해당 학생의 번호에 맞는 보석 필터링 적립
                for(let i = 1; i < rows.length; i++) {
                    if(rows[i] && parseInt(rows[i][1]) === studentId) {
                        currentStudent.inventory.push({
                            id: rows[i][3],
                            name: rows[i][4],
                            color: rows[i][5],
                            icon: rows[i][6],
                            date: rows[i][7],
                            reason: rows[i][8] ? rows[i][8].replace(/[\r\n]/g, "") : ""
                        });
                    }
                }
            } catch (error) {
                console.log("구글 시트 연동 전 대기 상태입니다.");
            }

            renderStudentInterface();
        }

        function renderStudentInterface() {
            document.getElementById('studentName').innerText = currentStudent.name;
            document.getElementById('summaryCounter').innerText = `내가 차곡차곡 모은 소중한 가치 보석은 총 [ ${currentStudent.inventory.length}개 ] 입니다! 🎉`;

            const grid = document.getElementById('studentBankGrid');
            grid.innerHTML = '';

            currentStudent.inventory.forEach(item => {
                const slot = document.createElement('div');
                slot.className = 'bank-slot';
                slot.onclick = () => openStudentModal(item);
                slot.innerHTML = `
                    <div class="bank-circle" style="background-color: ${item.color};">${item.icon}</div>
                    <div class="bank-label">${item.name}</div>
                    <div class="bank-date">${item.date}</div>
                `;
                grid.appendChild(slot);
            });

            const emptyCount = Math.max(0, 10 - currentStudent.inventory.length);
            for(let i=0; i<emptyCount; i++) {
                grid.innerHTML += `<div class="bank-slot"><div class="bank-circle" style="background: #f4f4f4; box-shadow:none;"></div></div>`;
            }

            // 배지 자동 계산 시스템 (예시: 임의 가치보석 총합이 5개 이상일 때 자동 발급)
            const bZone = document.getElementById('badgeGridZone');
            bZone.innerHTML = '';
            
            if (currentStudent.inventory.length >= 5) {
                bZone.innerHTML += `<div class="badge-item">🏅 가치 도보 정복 배지<br><span style="font-size:14px; color:#666;">(조건 달성)</span></div>`;
            } else {
                bZone.innerHTML = `<p style="font-size:18px; color:#aaa; font-style:italic; padding-top:20px;">보석을 5개 이상 모으면 멋진 가치 배지가 나타나요!</p>`;
            }
        }

        function openStudentModal(item) {
            const circle = document.getElementById('mCircle');
            circle.innerText = item.icon; circle.style.backgroundColor = item.color;
            document.getElementById('mDate').innerText = item.date;
            document.getElementById('mReason').innerText = item.reason;
            document.getElementById('studentDetailModal').style.display = 'flex';
        }

        function closeStudentModal() { document.getElementById('studentDetailModal').style.display = 'none'; }

        fetchLiveSheetData();
    </script>
</body>
</html>
